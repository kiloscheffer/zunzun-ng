# Local pre-commit hooks. Optional, opt-in per developer:
#   uv tool install pre-commit
#   pre-commit install --hook-type commit-msg --hook-type pre-push
#
# After that, `git commit` and `git push` run these checks automatically.
# CI re-runs the equivalent checks via commit-check-action and pytest,
# so the local install is a convenience, not a merge gate.
#
# Hook families currently configured:
#   - commit-check: validates Conventional Commits message and
#     Conventional Branch name against cchk.toml at the repo root.
#   - ruff check: lint (E/W/F/I subset; see pyproject.toml
#     [tool.ruff.lint] for the full select/ignore list). Autofix-on-
#     commit is enabled so safe issues (whitespace, import order,
#     multi-import splits) repair themselves.
#   - ruff format: canonical formatter (Black-compatible). Reformats
#     in place on every commit so cosmetic style stays consistent.
#     The initial mass-reformat is recorded in .git-blame-ignore-revs
#     so git blame attributes the original authors of each line.
#   - mypy: project-wide static type check. See pyproject.toml
#     [tool.mypy] for the permissive baseline.

repos:
  - repo: https://github.com/commit-check/commit-check
    rev: v2.6.0
    hooks:
      - id: check-message
        stages: [commit-msg]
      - id: check-branch
        stages: [pre-push]

  - repo: local
    hooks:
      - id: ruff-check
        name: ruff lint (with --fix)
        entry: uv run ruff check --fix
        language: system
        types: [python]
        pass_filenames: false
      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]
        pass_filenames: false
      - id: mypy
        name: mypy
        entry: uv run mypy .
        language: system
        types: [python]
        pass_filenames: false
