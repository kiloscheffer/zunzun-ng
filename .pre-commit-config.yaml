# Local pre-commit hooks. Optional, opt-in per developer:
#   uv tool install pre-commit
#   pre-commit install --hook-type commit-msg --hook-type pre-push
#
# After that, `git commit` and `git push` run these checks automatically.
# CI re-runs the equivalent checks via commit-check-action and pytest,
# so the local install is a convenience, not a merge gate.
#
# Hook families currently configured:
#   - commit-check: validates Conventional Commits message and
#     Conventional Branch name against cchk.toml at the repo root.
#   - ruff: lint (E/W/F/I subset; see pyproject.toml [tool.ruff.lint]
#     for the full select/ignore list). Autofix-on-commit is enabled
#     so safe issues (whitespace, import order, multi-import splits)
#     repair themselves without manual intervention.
#   - mypy: project-wide static type check. Runs in unstrict mode
#     (no [tool.mypy] config in pyproject.toml on purpose — strict
#     mode would surface dozens of issues in the 2016-era code that
#     would block every commit until addressed).

repos:
  - repo: https://github.com/commit-check/commit-check
    rev: v2.6.0
    hooks:
      - id: check-message
        stages: [commit-msg]
      - id: check-branch
        stages: [pre-push]

  - repo: local
    hooks:
      - id: ruff
        name: ruff lint (with --fix)
        entry: uv run ruff check --fix
        language: system
        types: [python]
        pass_filenames: false
      - id: mypy
        name: mypy
        entry: uv run mypy .
        language: system
        types: [python]
        pass_filenames: false
