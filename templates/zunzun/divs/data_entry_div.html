<div id="dataEntry" class="hideable hidden">
<h2>Text data editor</h2>
<p>Cut-and-paste text or edit data here</p>
<table>
<tr>
    <td>
    {{ mainForm.commaConversion }}
    </td>
</tr>
</table>

{% if mainForm.weightedFittingPossibleFlag %}
<br>
<table>
<tr>
    <td>
    {{ mainForm.weightedFittingChoice }}
    </td>
</tr>
</table>
{% endif %}

<p>{{ mainForm.textDataEditor }}</p>
<button type="button" onClick="javascript:this.form.textDataEditor.value=''">Clear All Text</button>
</div>
