name: commit-check

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # Validate commit messages on every PR. The action reads cchk.toml
      # for the allow-list of types, max-length, etc.
      - name: Validate commit messages
        uses: commit-check/commit-check-action@f237ed0085f49444ab5c85bdfa5cdcd490fc09c5 # v2.7.0
        with:
          message: true
          branch: false
          job-summary: true
          pr-comments: true

      # Validate branch name on non-bot PRs. Bot-opened PRs (Dependabot,
      # Renovate) use prefixes like `dependabot/github_actions/<group>`
      # that don't match cchk.toml's allow_branch_types; skipping bot
      # PRs avoids spurious failures.
      #
      # Field choice: `github.event.pull_request.user.login`, NOT
      # `github.actor`. `github.actor` is whoever triggered the current
      # workflow run — when a human clicks "Update branch" on a bot PR,
      # actor becomes the human and this filter would no longer fire.
      # `pull_request.user.login` is the PR author, which stays
      # `dependabot[bot]` regardless of who clicks Update.
      #
      # `pr-comments: false` here so the branch step doesn't post a
      # second PR comment on top of the message step's existing one.
      - name: Validate branch name
        if: ${{ !endsWith(github.event.pull_request.user.login, '[bot]') }}
        uses: commit-check/commit-check-action@f237ed0085f49444ab5c85bdfa5cdcd490fc09c5 # v2.7.0
        with:
          message: false
          branch: true
          job-summary: true
          pr-comments: false
